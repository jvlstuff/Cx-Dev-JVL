name: SBOM Compliance score test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:

jobs:
  sbom-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install SBOMQS
      run: |
        VERSION=$(curl -s https://api.github.com/repos/interlynk-io/sbomqs/releases/latest | jq -r '.tag_name' | sed 's/v//')
        wget https://github.com/interlynk-io/sbomqs/releases/download/v${VERSION}/sbomqs_${VERSION}_Linux_x86_64.tar.gz
        tar -xzvf sbomqs_${VERSION}_Linux_x86_64.tar.gz
        rm -rf sbomqs_${VERSION}_Linux_x86_64.tar.gz
        chmod +x sbomqs
        sudo mv sbomqs /usr/local/bin/
        
        
    - name: Get SBOM
      run: |
        # Example using syft
        wget -O sbom.json https://github.com/interlynk-io/sbomqs/blob/main/testdata/fixtures/spdx-perfect-score.json
        ls -al
        
    - name: Check SBOM Quality
      run: |
        score=$(sbomqs score sbom.json --json | jq '.files[0].sbom_quality_score')
        echo "SBOM Score: $score/10"
        
        if (( $(echo "$score < 7.0" | bc -l) )); then
          echo "::error::SBOM quality score too low: $score"
          exit 1
        fi
        
    - name: Check Compliance
      run: |
        sbomqs compliance --bsi-v2 sbom.json --json > compliance.json
        
        if [ $(jq '.summary.compliant' compliance.json) != "true" ]; then
          echo "::error::SBOM is not BSI compliant"
          jq '.recommendations[]' compliance.json
          exit 1
        fi
        
    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: sbom-reports
        path: |
          sbom.json
          compliance.json
